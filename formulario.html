<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
    <div class="contenedor-formulario">
        <h2>Complete el siguiente formulario</h2>
        <h5>Si quiere volver al cv hacer click en "volver al cv"</h5>
        <a href="cv.html" class="enlace-volver">volver al cv</a>
        
        <form action="" method="">
            <div class="grupo-campo">
                <label for="nom">Nombre</label>
                <input type="text" id="nom" name="nombre">
            </div>
            
            <div class="grupo-campo">
                <label for="ape">Apellido</label>
                <input type="text" id="ape" name="apellido">
            </div>
            
            <div class="grupo-campo">
                <label for="pass">crear contraseña</label> 
                <input type="password" id="pass" name="pass">
            </div>
            
            <div class="grupo-genero">
                <span class="titulo-genero">Sexo(Genero)</span>
                <div class="opciones-genero">
                    <label><input type="radio" name="sexo" value="hombre"> Hombre</label>
                    <label><input type="radio" name="sexo" value="mujer"> Mujer</label>
                </div>
            </div>
            
            <div class="grupo-campo">
                <label for="titulo">Titulo</label>
                <select id="titulo" name="titulo">
                    <option value="primario">Primario</option>
                    <option value="secundario">Secundario</option>
                    <option value="terciario">Terciario</option>
                    <option value="universitario">Universitario</option>
                </select>
            </div>
            
            <div class="grupo-campo campo-textarea">
                <label for="comentarios">Comentarios</label>
                <textarea id="comentarios" name="comentarios"></textarea>
            </div>
            
            <div class="grupo-botones">
                <input type="submit" value="Enviar" class="btn">
                <input type="reset" value="Borrar" class="btn">
            </div>
        </form>
    </div>
</body>
</html>
